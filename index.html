<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stake Flasher</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #0f172a;
    color: white;
    text-align: center;
    padding: 10px;
}

.container {
    width: 100%;
    max-width: 400px;
    margin: auto;
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    border: none;
}

button {
    background-color: green;
    color: white;
    font-weight: bold;
}

img {
    width: 100%;
    max-width: 200px;
    height: auto;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Stake Flasher</h2>
    <p>Select Cryptocurrency</p>

    <select disabled>
        <option>USDT (BEP-20)</option>
    </select>

    <img src="wallet_qr.png" alt="QR Code">

    <p id="address" style="word-wrap: break-word;">
        0x24f551eae922e4a72b05f678626e86ee241461a0
    </p>

    <button onclick="copyAddress()">Copy Address</button>

    <input type="text" placeholder="Stake ID">
    <input type="text" placeholder="Your Wallet Address">

    <input type="number" id="amount" placeholder="Amount Sent (USD)">

    <input type="file">

    <button onclick="submitForm()">Submit</button>
</div>

<script>
// Copy address
function copyAddress() {
    const address = document.getElementById("address").innerText;
    navigator.clipboard.writeText(address);
    alert("Address Copied!");
}

// Amount multiply logic (only once)
document.getElementById("amount").addEventListener("change", function() {
    let value = parseFloat(this.value);

    if (value >= 100) {
        this.value = value * 10;
    }
});

// Submit
function submitForm() {
    alert("Payment Submitted Successfully ✅");
}
</script>

</body>
</html>
